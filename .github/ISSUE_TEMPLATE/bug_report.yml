name: Bug report
description: Report incorrect behavior, crashes, or confusing results.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Parry. Please include a minimal reproduction when possible.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Paste the smallest code sample, input, output, or tool call that reproduces the issue.
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect Parry to do?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What did Parry do instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Parry version
      placeholder: "0.1.0"
    validations:
      required: false
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Input guard
        - Output guard
        - Agent/tool guard
        - MCP boundary
        - OpenAI integration
        - Anthropic integration
        - LangChain integration
        - FastAPI integration
        - Documentation
        - Other
    validations:
      required: true
